<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charts &mdash; Trade With Hunna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    --bg: #0A0F1E;
    --card: #12193A;
    --card-border: #232C55;
    --text: #F1F3FA;
    --text-dim: #8B92B8;
    --accent: #5B8CFF;
    --green: #2ED8A7;
    --purple: #A76BFF;
    --red: #FF5C6C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px; border-bottom: 1px solid var(--card-border);
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; text-decoration: none; color: var(--text); }
  .brand .glyph { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 15px; }

  nav.subnav { display: flex; gap: 4px; padding: 0 20px; border-bottom: 1px solid var(--card-border); overflow-x: auto; background: #0F1630; }
  nav.subnav a { display: flex; align-items: center; gap: 7px; padding: 14px 16px; font-size: 14px; font-weight: 500; color: var(--text-dim); text-decoration: none; white-space: nowrap; border-bottom: 2px solid transparent; }
  nav.subnav a.active { color: var(--text); border-bottom-color: var(--accent); }
  nav.subnav a.disabled:hover { color: var(--text-dim); }

  .toolbar {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 18px 24px; border-bottom: 1px solid var(--card-border);
  }
  select {
    background: var(--card); color: var(--text); border: 1px solid var(--card-border);
    padding: 9px 14px; border-radius: 8px; font-size: 14px; font-family: inherit;
  }
  .price-readout { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); display: inline-block; margin-right: 6px; }
  .status-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.err { background: var(--red); }

  #chart-wrap { padding: 20px 24px 50px; }
  #chart-container { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; height: 480px; }

  .note { max-width: 700px; margin: 0 auto; text-align: center; font-size: 12px; color: #5C6389; padding: 0 24px 40px; }
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="/"><span class="glyph">&#9889;</span> Trade With Hunna</a>
  <a href="dashboard.html" style="font-size:13px; color:#8B92B8; text-decoration:none;">&larr; Back to Dashboard</a>
</div>

<nav class="subnav">
  <a href="dashboard.html">&#128202; Dashboard</a>
  <a href="#" class="disabled">&#128200; Manual Trader</a>
  <a href="#" class="disabled">&#129302; Bot Builder</a>
  <a href="charts.html" class="active">&#128201; Charts</a>
  <a href="#" class="disabled">&#128257; Copy Trader</a>
  <a href="#" class="disabled">&#128737;&#65039; Risk Calculator</a>
</nav>

<div class="toolbar">
  <select id="symbol-select">
    <option value="R_10">Volatility 10 Index</option>
    <option value="R_25">Volatility 25 Index</option>
    <option value="R_50">Volatility 50 Index</option>
    <option value="R_75" selected>Volatility 75 Index</option>
    <option value="R_100">Volatility 100 Index</option>
    <option value="1HZ100V">Volatility 100 (1s) Index</option>
  </select>
  <span class="mono"><span class="status-dot" id="status-dot"></span><span id="status-text">Connecting&hellip;</span></span>
  <span class="price-readout mono" id="price-readout"></span>
</div>

<div id="chart-wrap">
  <div id="chart-container"></div>
</div>

<div class="note">Live market data from Deriv &mdash; no login required to view charts.</div>

<script>
  const PROXY_WS_URL = 'wss://trade-with-hunna-backend.onrender.com/ws/market-data';
  const container = document.getElementById('chart-container');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const priceReadout = document.getElementById('price-readout');
  const symbolSelect = document.getElementById('symbol-select');

  const chart = LightweightCharts.createChart(container, {
    layout: { background: { color: 'transparent' }, textColor: '#8B92B8' },
    grid: { vertLines: { color: '#1B2347' }, horzLines: { color: '#1B2347' } },
    timeScale: { timeVisible: true, secondsVisible: false },
    rightPriceScale: { borderColor: '#232C55' },
  });
  const series = chart.addCandlestickSeries({
    upColor: '#2ED8A7', downColor: '#FF5C6C',
    borderVisible: false,
    wickUpColor: '#2ED8A7', wickDownColor: '#FF5C6C',
  });

  window.addEventListener('resize', () => {
    chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
  });
  chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });

  let ws = null;
  let currentSymbol = symbolSelect.value;

  function setStatus(state, text) {
    statusDot.className = 'status-dot' + (state ? ' ' + state : '');
    statusText.textContent = text;
  }

  function connect(symbol) {
    if (ws) { ws.close(); }
    setStatus('', 'Connecting\u2026');
    series.setData([]);

    ws = new WebSocket(PROXY_WS_URL);

    ws.onopen = () => {
      ws.send(JSON.stringify({
        ticks_history: symbol,
        adjust_start_time: 1,
        count: 200,
        end: 'latest',
        start: 1,
        style: 'candles',
        granularity: 60,
        subscribe: 1,
      }));
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.error) {
        setStatus('err', data.error.message || 'Error loading data');
        return;
      }

      if (data.msg_type === 'candles' && data.candles) {
        const bars = data.candles.map((c) => ({
          time: c.epoch,
          open: parseFloat(c.open),
          high: parseFloat(c.high),
          low: parseFloat(c.low),
          close: parseFloat(c.close),
        }));
        series.setData(bars);
        chart.timeScale().fitContent();
        const last = bars[bars.length - 1];
        if (last) priceReadout.textContent = last.close.toFixed(2);
        setStatus('live', 'Live');
      }

      if (data.msg_type === 'ohlc' && data.ohlc) {
        const c = data.ohlc;
        const bar = {
          time: c.open_time,
          open: parseFloat(c.open),
          high: parseFloat(c.high),
          low: parseFloat(c.low),
          close: parseFloat(c.close),
        };
        series.update(bar);
        priceReadout.textContent = bar.close.toFixed(2);
        setStatus('live', 'Live');
      }
    };

    ws.onerror = () => setStatus('err', 'Connection error');
    ws.onclose = () => setStatus('err', 'Disconnected');
  }

  symbolSelect.addEventListener('change', () => {
    currentSymbol = symbolSelect.value;
    connect(currentSymbol);
  });

  connect(currentSymbol);
</script>

</body>
</html>
