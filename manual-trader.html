<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual Trader &mdash; Trade With Hunna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0F1E;
    --card: #12193A;
    --card-border: #232C55;
    --text: #F1F3FA;
    --text-dim: #8B92B8;
    --accent: #5B8CFF;
    --green: #2ED8A7;
    --purple: #A76BFF;
    --red: #FF5C6C;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid var(--card-border); }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; text-decoration: none; color: var(--text); }
  .brand .glyph { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .balance-pill { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--card-border); padding: 8px 16px; border-radius: 999px; font-size: 14px; font-weight: 600; }
  .balance-pill .amt { color: var(--green); }
  .balance-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

  nav.subnav { display: flex; gap: 4px; padding: 0 20px; border-bottom: 1px solid var(--card-border); overflow-x: auto; background: #0F1630; }
  nav.subnav a { display: flex; align-items: center; gap: 7px; padding: 14px 16px; font-size: 14px; font-weight: 500; color: var(--text-dim); text-decoration: none; white-space: nowrap; border-bottom: 2px solid transparent; }
  nav.subnav a.active { color: var(--text); border-bottom-color: var(--accent); }

  .layout { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }
  .warning {
    background: rgba(255,92,108,0.08); border: 1px solid rgba(255,92,108,0.3);
    color: #FFB4BC; font-size: 13px; padding: 14px 18px; border-radius: 10px; margin-bottom: 28px; line-height: 1.5;
  }
  .panel { background: var(--card); border: 1px solid var(--card-border); border-radius: 16px; padding: 28px; }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
  select, input {
    width: 100%; background: #0F1630; color: var(--text); border: 1px solid var(--card-border);
    padding: 12px 14px; border-radius: 10px; font-size: 15px; font-family: inherit;
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .price-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 14px 16px; background: #0F1630; border-radius: 10px; }
  .price-line .val { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 18px; }

  .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 8px; }
  .buy-btn {
    padding: 18px; border-radius: 12px; border: none; font-weight: 700; font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .buy-btn.rise { background: linear-gradient(135deg, var(--green), #1FAF87); color: #04120C; }
  .buy-btn.fall { background: linear-gradient(135deg, var(--red), #C93E4D); color: #2A0508; }
  .buy-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .result { margin-top: 24px; padding: 18px; border-radius: 12px; font-size: 14px; line-height: 1.6; display: none; }
  .result.success { background: rgba(46,216,167,0.08); border: 1px solid rgba(46,216,167,0.3); color: #B9F5E3; display: block; }
  .result.error { background: rgba(255,92,108,0.08); border: 1px solid rgba(255,92,108,0.3); color: #FFB4BC; display: block; }

  .gate { text-align: center; padding: 80px 24px; }
  .gate h2 { font-size: 24px; margin-bottom: 12px; }
  .gate p { color: var(--text-dim); margin-bottom: 24px; }
  .btn-primary { display: inline-block; background: linear-gradient(135deg, var(--accent), var(--purple)); color: #fff; font-weight: 700; padding: 14px 26px; border-radius: 10px; text-decoration: none; }
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="/"><span class="glyph">&#9889;</span> Trade With Hunna</a>
  <div class="balance-pill" id="balance-pill"><span class="dot"></span><span>&hellip;</span></div>
</div>

<nav class="subnav">
  <a href="dashboard.html">&#128202; Dashboard</a>
  <a href="manual-trader.html" class="active">&#128200; Manual Trader</a>
  <a href="#" class="disabled">&#129302; Bot Builder</a>
  <a href="charts.html">&#128201; Charts</a>
  <a href="#" class="disabled">&#128257; Copy Trader</a>
  <a href="#" class="disabled">&#128737;&#65039; Risk Calculator</a>
</nav>

<div id="content">
  <div class="gate">
    <h2 class="mono">Checking session&hellip;</h2>
  </div>
</div>

<script>
  const BACKEND_URL = 'https://trade-with-hunna-backend.onrender.com';
  const PROXY_WS_URL = 'wss://trade-with-hunna-backend.onrender.com/ws/market-data';
  const balancePill = document.getElementById('balance-pill');
  const content = document.getElementById('content');
  let currency = 'USD';
  let priceWs = null;

  function renderLoggedOut() {
    balancePill.innerHTML = '<span>Not logged in</span>';
    content.innerHTML = `
      <div class="gate">
        <h2>Log in to trade</h2>
        <p>You need a connected Deriv account to place trades.</p>
        <a class="btn-primary" href="${BACKEND_URL}/login">Log in with Deriv</a>
      </div>`;
  }

  function renderTrader(account) {
    currency = account.currency || 'USD';
    const balance = typeof account.balance === 'number' ? account.balance.toFixed(2) : '0.00';
    balancePill.innerHTML = `<span class="dot"></span><span class="amt mono">${balance} ${escapeHtml(currency)}</span>`;

    content.innerHTML = `
      <div class="layout">
        <div class="warning">&#9888;&#65039; This places a real trade on your Deriv account using real funds. Only trade with money you can afford to lose.</div>
        <div class="panel">
          <div class="price-line">
            <span class="mono" style="color:var(--text-dim); font-size:13px;">CURRENT PRICE</span>
            <span class="val mono" id="live-price">&hellip;</span>
          </div>
          <div class="field">
            <label>Market</label>
            <select id="symbol-select">
              <option value="R_10">Volatility 10 Index</option>
              <option value="R_25">Volatility 25 Index</option>
              <option value="R_50">Volatility 50 Index</option>
              <option value="R_75" selected>Volatility 75 Index</option>
              <option value="R_100">Volatility 100 Index</option>
            </select>
          </div>
          <div class="row">
            <div class="field">
              <label>Stake (${escapeHtml(currency)})</label>
              <input type="number" id="stake-input" value="1" min="0.35" step="0.01">
            </div>
            <div class="field">
              <label>Duration (ticks)</label>
              <input type="number" id="duration-input" value="5" min="1" max="10" step="1">
            </div>
          </div>
          <div class="buttons">
            <button class="buy-btn rise" id="rise-btn">&#9650; Rise</button>
            <button class="buy-btn fall" id="fall-btn">&#9660; Fall</button>
          </div>
          <div class="result" id="result"></div>
        </div>
      </div>`;

    connectPriceFeed(document.getElementById('symbol-select').value);
    document.getElementById('symbol-select').addEventListener('change', (e) => connectPriceFeed(e.target.value));
    document.getElementById('rise-btn').addEventListener('click', () => placeTrade('CALL'));
    document.getElementById('fall-btn').addEventListener('click', () => placeTrade('PUT'));
  }

  function connectPriceFeed(symbol) {
    if (priceWs) priceWs.close();
    const priceEl = document.getElementById('live-price');
    if (priceEl) priceEl.textContent = '\u2026';
    priceWs = new WebSocket(PROXY_WS_URL);
    priceWs.onopen = () => priceWs.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
    priceWs.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.msg_type === 'tick' && data.tick) {
        const el = document.getElementById('live-price');
        if (el) el.textContent = parseFloat(data.tick.quote).toFixed(2);
      }
    };
  }

  async function placeTrade(contractType) {
    const symbol = document.getElementById('symbol-select').value;
    const stake = document.getElementById('stake-input').value;
    const duration = document.getElementById('duration-input').value;
    const resultEl = document.getElementById('result');
    const riseBtn = document.getElementById('rise-btn');
    const fallBtn = document.getElementById('fall-btn');

    riseBtn.disabled = true;
    fallBtn.disabled = true;
    resultEl.className = 'result';
    resultEl.textContent = '';

    try {
      const res = await fetch(`${BACKEND_URL}/api/trade`, {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          symbol,
          contractType,
          stake,
          duration,
          durationUnit: 't',
          currency,
        }),
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        resultEl.className = 'result error';
        resultEl.textContent = 'Trade failed: ' + (data.message || data.error || 'Unknown error');
      } else {
        resultEl.className = 'result success';
        resultEl.innerHTML = `Trade placed.<br>${escapeHtml(data.longcode || '')}<br>Buy price: ${data.buyPrice} ${escapeHtml(currency)} &middot; Potential payout: ${data.payout} ${escapeHtml(currency)}`;
      }
    } catch (err) {
      resultEl.className = 'result error';
      resultEl.textContent = 'Trade failed: could not reach server.';
    } finally {
      riseBtn.disabled = false;
      fallBtn.disabled = false;
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  fetch(`${BACKEND_URL}/me`, { credentials: 'include' })
    .then((res) => res.json())
    .then((meData) => {
      if (!meData.loggedIn) { renderLoggedOut(); return; }
      return fetch(`${BACKEND_URL}/api/accounts`, { credentials: 'include' })
        .then((res) => res.json())
        .then((accountData) => {
          if (accountData.error) { renderLoggedOut(); return; }
          renderTrader(accountData);
        });
    })
    .catch(() => renderLoggedOut());
</script>

</body>
</html>
